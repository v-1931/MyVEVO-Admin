<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Fee Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #eaeff2; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-save { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        th { background: #002d5a; color: white; }
        .badge-paid { background: #28a745; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .badge-unpaid { background: #ff9800; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .btn-edit { background: #007bff; color: white; border: none; padding: 6px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 6px 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
  <a href="#" target="_blank" style="display:block;">
  <img src="https://uploads.onecompiler.io/44ggv5rcj/44ggv6n9r/9309.jpg"  alt="aud" 
       style="width:100%; height:auto;">
</a>
    <h2 style="text-align:center; color: #002d5a;">Employer Add Dashboard</h2>
    
    <div class="grid-inputs">
        <input type="text" id="aPass" placeholder="Passport Number (ID)">
        <input type="text" id="aEmp" placeholder="Employer Name">
        <select id="aType">           
        <option>Application Status</option><option>Employer Jobs Status</option><option>Biometric Rrequired Submit</option>
        <option>Manpower Status</option><option>Work permit Status</option><option>E-Visa Status</option>
            <option>Certificate (NOC) From Employer Status</option><option>Financial Bank statements Summit</option>

        </select>
        <select id="aStatus">
            <option value="Not Paid">Not Paid (⌛)</option>
            <option value="Paid">Paid (✅)</option>
        </select>
        <input type="text" id="aDate" placeholder="Date (yy-yy-yyyy)">
        <input type="text" id="aCurr" placeholder="AUD-USDT (***)">
    </div>
    <button class="btn-save" onclick="saveData()">Save / Update Record</button>

    <table>
        <thead>
            <tr><th>Passport</th><th>Employer</th><th>Type</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://webpagecybersecurity-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function saveData() {
        const pass = document.getElementById('aPass').value;
        if(!pass) return alert("Passport ID missing!");

        db.ref('fee_payments/' + pass).set({
            employer: document.getElementById('aEmp').value,
            type: document.getElementById('aType').value,
            status: document.getElementById('aStatus').value,
            pay_date: document.getElementById('aDate').value,
            currency: document.getElementById('aCurr').value
        }).then(() => { alert("Saved!"); clearForm(); });
    }

    db.ref('fee_payments').on('value', (snap) => {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        snap.forEach((child) => {
            const d = child.val();
            const statusClass = d.status === "Paid" ? "badge-paid" : "badge-unpaid";
            tbody.innerHTML += `<tr>
                <td><b>${child.key}</b></td>
                <td>${d.employer}</td>
                <td>${d.type}</td>
                <td><span class="${statusClass}">${d.status}</span></td>
                <td>
                    <button class="btn-edit" onclick="editData('${child.key}')">Edit</button>
                    <button class="btn-del" onclick="deleteData('${child.key}')">Del</button>
                </td>
            </tr>`;
        });
    });

    function editData(id) {
        db.ref('fee_payments/' + id).once('value', (s) => {
            const data = s.val();
            document.getElementById('aPass').value = id;
            document.getElementById('aEmp').value = data.employer;
            document.getElementById('aType').value = data.type;
            document.getElementById('aStatus').value = data.status;
            document.getElementById('aDate').value = data.pay_date;
            document.getElementById('aCurr').value = data.currency;
            window.scrollTo(0,0);
        });
    }

    function deleteData(id) {
        if(confirm("Are you sure?")) db.ref('fee_payments/' + id).remove();
    }

    function clearForm() {
        const fields = ['aPass','aEmp','aDate','aCurr'];
        fields.forEach(f => document.getElementById(f).value = "");
    }
</script>
</body>
</html>
